name: Automasi Garage Abang Din

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  jalankan-automasi:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil kod repo
      uses: actions/checkout@v4

    - name: Pasang Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Pasang Library Tambahan
      run: pip install requests

    # ==========================================================================
    # KOLEKSI 1: AUTOMASI MOOD (Dijalankan oleh Robot Mood)
    # ==========================================================================
    制造- name: Jalankan skrip tukar_mood.py
      run: python tukar_mood.py

    - name: Commit oleh Robot Mood
      run: |
        git config --local user.email "mood-bot@github.com"
        git config --local user.name "Mekanik_Python_Mood" # <-- Nama Robot Pertama Abang!
        git add index.html
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Mood: Dikemaskini oleh Mekanik Python"

    # ==========================================================================
    # KOLEKSI 2: AUTOMASI PELAWAT (Dijalankan oleh Robot Penjaga Kaunter)
    # ==========================================================================
    - name: Jalankan skrip kemaskini_pelawat.py
      run: python kemaskini_pelawat.py

    - name: Commit oleh Robot Kaunter & Push Semua
      run: |
        git config --local user.email "counter-bot@github.com"
        git config --local user.name "Robot_Penjaga_Garage" # <-- Nama Robot Kedua Abang!
        git add index.html
        git diff --quiet && git diff --staged --quiet || git commit -m "📊 Pelawat: Dikemaskini oleh Robot Penjaga Garage"
        git push # <-- Hantar semua sekali gus ke GitHub abang